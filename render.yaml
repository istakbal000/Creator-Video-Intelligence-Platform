services:
  # Backend Web Service (using Docker to include yt-dlp & ffmpeg)
  - type: web
    name: creator-video-backend
    env: docker
    rootDir: backend
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://creator-video-intelligence-platform-1.onrender.com
      - key: GOOGLE_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: creator-video-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://creator-video-intelligence-platform.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://creator-video-intelligence-platform.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
